name: PR symbol diff

on:
  pull_request:
    paths:
      - "examples/demo-spring/**"
      - "src/**"
      - "scripts/verify_demo_context.py"
      - ".github/workflows/pr-symbol-diff.yml"

jobs:
  demo-spring-context-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain image
        run: docker compose build anchor-stubborn

      - name: Run demo-spring E2E
        run: docker compose run --rm e2e

      - name: Verify OrderService context neighbors
        run: docker compose run --rm shell python /opt/anchor-stubborn/scripts/verify_demo_context.py

  fixture-symbol-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Index minimal fixture (baseline)
        run: anchor-stubborn index --scip examples/fixtures/minimal.scip --out /tmp/baseline.db

      - name: Index minimal fixture (candidate)
        run: anchor-stubborn index --scip examples/fixtures/minimal.scip --out /tmp/candidate.db

      - name: Reconcile symbol sets
        run: anchor-stubborn diff /tmp/baseline.db /tmp/candidate.db

      - name: Run unit tests
        run: pytest -v
