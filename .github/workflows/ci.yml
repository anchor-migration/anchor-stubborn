name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  demo-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain image
        run: docker compose build anchor-stubborn

      - name: Run demo-spring E2E
        run: docker compose run --rm e2e

      - name: Verify OrderService context guard
        run: docker compose run --rm shell python /opt/anchor-stubborn/scripts/verify_demo_context.py

      - name: Verify OrderController context guard
        run: docker compose run --rm shell python /opt/anchor-stubborn/scripts/verify_controller_context.py

      - uses: actions/upload-artifact@v4
        with:
          name: demo-spring-symbols-db
          path: examples/demo-spring/metadata/symbols.db
          retention-days: 2

  test:
    runs-on: ubuntu-latest
    needs: demo-index
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: demo-spring-symbols-db
          path: examples/demo-spring/metadata

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
