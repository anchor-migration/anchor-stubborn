services:
  # Build once: docker compose build
  anchor-stubborn:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SCIP_JAVA_VERSION: "0.12.3"
    image: anchor-stubborn:e2e

  e2e:
    image: anchor-stubborn:e2e
    entrypoint: ["/bin/bash", "/usr/local/bin/run-demo-e2e"]
    working_dir: /demo
    volumes:
      - ./examples/demo-spring:/demo

  petclinic-e2e:
    image: anchor-stubborn:e2e
    entrypoint: ["/bin/bash", "/usr/local/bin/run-petclinic-e2e"]
    volumes:
      - .:/opt/anchor-stubborn
    environment:
      PETCLINIC_ROOT: /petclinic

  dukesbank-e2e:
    image: anchor-stubborn:e2e
    entrypoint: ["/bin/bash", "/usr/local/bin/run-dukesbank-e2e"]
    volumes:
      - .:/opt/anchor-stubborn
      - ../../dukesbank/src/j2eetutorial14/examples/bank:/bank:ro
    environment:
      BANK_ROOT: /bank
      EXAMPLE_ROOT: /opt/anchor-stubborn/examples/dukesbank

  shell:
    image: anchor-stubborn:e2e
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
    working_dir: /opt/anchor-stubborn
    volumes:
      - .:/opt/anchor-stubborn
      - ./examples/demo-spring:/demo

  cli:
    image: anchor-stubborn:e2e
    entrypoint: ["anchor-stubborn"]
    working_dir: /workspace
    volumes:
      - .:/opt/anchor-stubborn
      - ./examples/demo-spring:/demo
